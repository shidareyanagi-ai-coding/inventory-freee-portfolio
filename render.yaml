# Render Blueprint（A-6 デプロイ）: 在庫ダッシュボードと疑似freee を「同じ Clerk ログイン」で公開する。
# 使い方: Render で「New + → Blueprint」→ この GitHub リポジトリを選ぶと本ファイルを自動で読む。
#   2 つの Web サービス（inventory-dashboard / pseudo-freee）が作られる。
#   秘密値(sync:false の項目)は Render の画面で各自入力する（このファイルには絶対に書かない）。
# 入口ページ(/launcher)で在庫⇄疑似freee を選ぶ。両サービスで同じ Clerk（公開キー/issuer）を使う＝同じログイン。
services:
  # --- ① 在庫管理ダッシュボード（FastAPI + 需要予測/ML） ---------------------
  - type: web
    name: inventory-dashboard
    runtime: python
    plan: free                    # 無料枠（15分無アクセスでスリープ→次アクセスで数十秒の起動）
    region: singapore             # Neon/R2 と同じ APAC（日本から近い）
    buildCommand: pip install -r requirements.txt
    startCommand: python inventory_dashboard/app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production         # Clerk 認証を強制（AUTH_DEV_MODE は本番では無効）
      - key: STORAGE_REGION
        value: auto               # R2 は auto

      # --- 以下は秘密 or 環境依存。Render 画面で入力する（sync:false=Blueprintから同期しない） ---
      - key: DATABASE_URL
        sync: false               # Neon 本番ブランチの接続文字列（?sslmode=require 付き）
      - key: CLERK_PUBLISHABLE_KEY
        sync: false               # pk_test_...（デモは Clerk の Development キーを流用）
      - key: CLERK_ISSUER
        sync: false               # https://xxxx.clerk.accounts.dev
      - key: STORAGE_ENDPOINT
        sync: false               # R2 の S3 API エンドポイント（https://〇〇.r2.cloudflarestorage.com）
      - key: STORAGE_BUCKET
        sync: false               # inventory-vouchers
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: PSEUDO_FREEE_API_URL
        sync: false               # 疑似freee の公開URL（②のURL。例 https://pseudo-freee.onrender.com）。
                                  #   入口ページ /launcher の「疑似freee」カードのリンク先＆「freee送信」の宛先を兼ねる。
                                  #   ② をデプロイしてURLが決まってから設定する（未設定なら freee送信は穏当に「接続できません」）。

      # ANTHROPIC_API_KEY は「設定しない」: BYO-key のため空のまま＝利用者が各自ブラウザで入力する。
      #   ここに鍵を入れると全員の解析が運営者(あなた)の課金になるので注意。

  # --- ② 疑似freee 会計（標準ライブラリ http.server + SQLite） ---------------
  # データは Render 無料枠のため揮発（再デプロイ/スリープ復帰で消える）。起動時にマスタを再シードするので
  #   常に綺麗な状態で見せられる。取引・レシートはデモ中に在庫からの送信や AI 取込でその場で作る方針。
  - type: web
    name: pseudo-freee
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python pseudo_freee/app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production         # Clerk サインインを必須化（在庫と同じログイン）
      # 同じ Clerk インスタンスを使う＝在庫と同じアカウントで両アプリを行き来できる。
      - key: CLERK_PUBLISHABLE_KEY
        sync: false               # 在庫と「同じ」pk_test_...
      - key: CLERK_ISSUER
        sync: false               # 在庫と「同じ」https://xxxx.clerk.accounts.dev
      - key: INVENTORY_APP_URL
        sync: false               # 在庫アプリ(入口ページの置き場所)の公開URL。例 https://inventory-dashboard-61w8.onrender.com
                                  #   疑似freee 画面上部の「← アプリ入口へ」リンク先になる。
      # ANTHROPIC_API_KEY は設定しない（BYO-key）: 未設定なら決定的スタブで動き、利用者が画面で
      #   自分のキーを貼ると実 Claude vision で読み取る（キーはブラウザのみ・サーバに保存しない）。在庫と同方針。
      # A-8 永続化: DATABASE_URL（疑似freee専用 Neon）と STORAGE_*（R2・在庫と同値）を画面で設定する。
      - key: DATABASE_URL
        sync: false               # 疑似freee専用の Neon DB（例 .../pseudo_freee?sslmode=require）。在庫とは別DB。
      - key: STORAGE_ENDPOINT
        sync: false               # R2（在庫と同じ値でOK。画像キーは pseudo-freee/ 接頭辞で分離）
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_REGION
        value: auto
